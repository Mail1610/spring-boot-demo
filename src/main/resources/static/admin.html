<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理後台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', sans-serif; background: #f5f5f5; }
  header { background: #37474f; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 1.4rem; }
  nav a { color: #ccc; text-decoration: none; font-size: 0.9rem; margin-left: 16px; }
  nav a:hover { color: white; }
  .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
  .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 24px; }
  .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: #37474f; border-bottom: 2px solid #37474f; padding-bottom: 8px; }
  .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat-box { flex: 1; min-width: 80px; background: #f5f7f8; border-radius: 8px; padding: 16px 12px; text-align: center; }
  .stat-num { font-size: 1.8rem; font-weight: bold; color: #37474f; line-height: 1; }
  .stat-label { font-size: 0.78rem; color: #777; margin-top: 6px; }
  .stat-box.revenue .stat-num { color: #c62828; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 0.85rem; color: #555; font-weight: bold; }
  .form-group input, .form-group select { padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #37474f; }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .container { padding: 0 8px; }
    .stats-row { gap: 8px; }
    .stat-num { font-size: 1.4rem; }
  }
  .form-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; min-height: 44px; }
  .btn-primary { background: #37474f; color: white; }
  .btn-danger { background: #c62828; color: white; }
  .btn-secondary { background: #eee; color: #333; }
  .btn:hover { opacity: 0.85; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 520px; }
  th { background: #37474f; color: white; padding: 10px 12px; text-align: left; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:hover td { background: #fafafa; }
  .badge-avail { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; }
  .badge-unavail { background: #ffebee; color: #c62828; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; }
  .actions { display: flex; gap: 6px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #323232; color: white; padding: 12px 24px; border-radius: 6px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; font-size: 0.9rem; }
  .toast.show { opacity: 1; }
  .table-add-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .table-add-row input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
  .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
  .qr-card { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; text-align: center; }
  .qr-card .table-label { font-weight: bold; font-size: 1.1rem; margin-bottom: 8px; color: #37474f; }
  .qr-card .qr-actions { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .qr-empty { color: #999; text-align: center; padding: 24px 0; font-size: 0.9rem; }
</style>
</head>
<body>
<header>
  <h1>⚙ 管理後台</h1>
  <nav>
    <a href="/">點餐頁面</a>
    <a href="/kitchen.html">廚房顯示</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h2>今日概況</h2>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="statPending">-</div>
        <div class="stat-label">待處理</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statPreparing">-</div>
        <div class="stat-label">製作中</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statDone">-</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-box revenue">
        <div class="stat-num" id="statRevenue">-</div>
        <div class="stat-label">今日營收</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2 id="formTitle">新增菜單</h2>
    <div class="form-row">
      <div class="form-group">
        <label>餐點名稱 *</label>
        <input id="fname" type="text" placeholder="例：招牌漢堡">
      </div>
      <div class="form-group">
        <label>分類 *</label>
        <input id="fcategory" type="text" placeholder="例：主食、飲料、甜點">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>價格 *</label>
        <input id="fprice" type="number" min="0" step="1" placeholder="例：120">
      </div>
      <div class="form-group">
        <label>狀態</label>
        <select id="favailable">
          <option value="true">上架</option>
          <option value="false">下架</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>描述</label>
        <input id="fdesc" type="text" placeholder="選填">
      </div>
      <div class="form-group">
        <label>圖片網址</label>
        <input id="fimageUrl" type="url" placeholder="選填（https://...）">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveItem()">儲存</button>
      <button class="btn btn-secondary" onclick="resetForm()">清除</button>
    </div>
    <input type="hidden" id="editId">
  </div>

  <div class="card">
    <h2>桌號 QR Code 管理</h2>
    <div class="table-add-row">
      <input id="tableInput" type="text" placeholder="輸入桌號（例：A1）" maxlength="10" onkeydown="if(event.key==='Enter')addTable()">
      <button class="btn btn-primary" onclick="addTable()">新增</button>
    </div>
    <div id="tableGrid" class="qr-grid"></div>
  </div>

  <div class="card">
    <h2>菜單列表</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>名稱</th><th>分類</th><th>價格</th><th>描述</th><th>狀態</th><th>操作</th></tr>
        </thead>
        <tbody id="menuTable"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let items = [];

async function loadItems() {
  const res = await fetch('/api/menu/all');
  const json = await res.json();
  items = json.data || [];
  renderTable();
}

function renderTable() {
  document.getElementById('menuTable').innerHTML = items.map(item => `
    <tr>
      <td><strong>${item.name}</strong>${item.imageUrl ? ' <span title="有圖片">🖼</span>' : ''}</td>
      <td>${item.category}</td>
      <td>$${item.price}</td>
      <td>${item.description || '-'}</td>
      <td><span class="${item.available ? 'badge-avail' : 'badge-unavail'}">${item.available ? '上架' : '下架'}</span></td>
      <td class="actions">
        <button class="btn btn-secondary" onclick="editItem(${item.id})">編輯</button>
        <button class="btn btn-danger" onclick="deleteItem(${item.id})">刪除</button>
      </td>
    </tr>`).join('');
}

function editItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  document.getElementById('editId').value = id;
  document.getElementById('fname').value = item.name;
  document.getElementById('fcategory').value = item.category;
  document.getElementById('fprice').value = item.price;
  document.getElementById('fdesc').value = item.description || '';
  document.getElementById('fimageUrl').value = item.imageUrl || '';
  document.getElementById('favailable').value = item.available;
  document.getElementById('formTitle').textContent = '編輯菜單';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function saveItem() {
  const name = document.getElementById('fname').value.trim();
  const category = document.getElementById('fcategory').value.trim();
  const price = document.getElementById('fprice').value;
  if (!name || !category || !price) { showToast('請填寫必填欄位'); return; }

  const payload = {
    name,
    category,
    price: parseFloat(price),
    description: document.getElementById('fdesc').value.trim(),
    imageUrl: document.getElementById('fimageUrl').value.trim() || null,
    available: document.getElementById('favailable').value === 'true'
  };

  const editId = document.getElementById('editId').value;
  const url = editId ? `/api/menu/${editId}` : '/api/menu';
  const method = editId ? 'PUT' : 'POST';

  const res = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (json.success) {
    showToast(editId ? '已更新' : '已新增');
    resetForm();
    loadItems();
  } else {
    showToast('儲存失敗：' + json.error);
  }
}

async function deleteItem(id) {
  if (!confirm('確定要刪除這個餐點嗎？')) return;
  const res = await fetch(`/api/menu/${id}`, { method: 'DELETE' });
  const json = await res.json();
  if (json.success) { showToast('已刪除'); loadItems(); }
  else showToast('刪除失敗：' + json.error);
}

function resetForm() {
  ['fname','fcategory','fprice','fdesc','fimageUrl','editId'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('favailable').value = 'true';
  document.getElementById('formTitle').textContent = '新增菜單';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadStats() {
  try {
    const res = await fetch('/api/orders');
    const json = await res.json();
    const orders = json.data || [];
    const today = new Date().toDateString();
    const todayOrders = orders.filter(o => new Date(o.createdAt).toDateString() === today);
    document.getElementById('statPending').textContent = todayOrders.filter(o => o.status === 'PENDING').length;
    document.getElementById('statPreparing').textContent = todayOrders.filter(o => o.status === 'PREPARING').length;
    document.getElementById('statDone').textContent = todayOrders.filter(o => o.status === 'DONE').length;
    const revenue = todayOrders.filter(o => o.status === 'DONE').reduce((s, o) => s + Number(o.totalAmount), 0);
    document.getElementById('statRevenue').textContent = '$' + revenue;
  } catch(e) {}
}

loadItems();
loadStats();

let tables = JSON.parse(localStorage.getItem('qr_tables') || '[]');

function saveTables() {
  localStorage.setItem('qr_tables', JSON.stringify(tables));
}

function addTable() {
  const input = document.getElementById('tableInput');
  const name = input.value.trim().toUpperCase();
  if (!name) { showToast('請輸入桌號'); return; }
  if (tables.includes(name)) { showToast('桌號已存在'); return; }
  tables.push(name);
  saveTables();
  input.value = '';
  renderTables();
}

function deleteTable(name) {
  tables = tables.filter(t => t !== name);
  saveTables();
  renderTables();
}

function downloadQR(name) {
  const canvas = document.getElementById('qr-' + name);
  const link = document.createElement('a');
  link.download = 'table-' + name + '.png';
  link.href = canvas.toDataURL();
  link.click();
}

function renderTables() {
  const grid = document.getElementById('tableGrid');
  if (tables.length === 0) {
    grid.innerHTML = '<p class="qr-empty">尚未設定桌號，請新增</p>';
    return;
  }
  grid.innerHTML = tables.map(name => `
    <div class="qr-card">
      <div class="table-label">桌 ${name}</div>
      <canvas id="qr-${name}"></canvas>
      <div class="qr-actions">
        <button class="btn btn-secondary" onclick="downloadQR('${name}')">下載</button>
        <button class="btn btn-danger" onclick="deleteTable('${name}')">刪除</button>
      </div>
    </div>`).join('');
  if (typeof QRCode === 'undefined') return;
  tables.forEach(name => {
    const url = window.location.origin + '/?table=' + encodeURIComponent(name);
    QRCode.toCanvas(document.getElementById('qr-' + name), url, { width: 128 }, function(err) {
      if (err) console.error('QR error:', name, err);
    });
  });
}

</script>
<script src="/qrcode.min.js" onload="renderTables()"></script>
</body>
</html>
